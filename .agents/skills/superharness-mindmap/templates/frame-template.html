<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Superharness</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a2e;
    --header-bg: #f8f9fa;
    --border: #e0e0e0;
    --accent: #4a90d9;
    --muted: #888;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --header-bg: #16213e;
      --border: #333;
      --accent: #6bb5ff;
      --muted: #777;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  .header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.875rem;
    flex-shrink: 0;
  }
  .header-title { font-weight: 600; color: var(--accent); }
  .header-status { font-size: 0.75rem; color: var(--muted); }
  #mindmap-container {
    flex: 1;
    width: 100%;
    overflow: hidden;
  }
  #mindmap-container svg {
    width: 100%;
    height: 100%;
  }
  .waiting {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--muted);
  }
  .waiting h2 { font-size: 1.25rem; font-weight: 500; margin-bottom: 0.5rem; }
  .waiting p { font-size: 0.875rem; }
</style>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18"></script>
</head>
<body>
<div class="header">
  <span class="header-title">superharness</span>
  <span class="header-status" id="status">connecting...</span>
</div>
<div id="mindmap-container">
  <div class="waiting">
    <div>
      <h2>Superharness Mindmap</h2>
      <p>等待 Agent 推送内容...</p>
    </div>
  </div>
</div>
<!-- HELPER_SCRIPT -->
</body>
</html>
