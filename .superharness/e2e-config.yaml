schema_version: "e2e-config/v1"

app:
  startup_cmd: "npm run dev"
  base_url: "http://localhost:4321/opensource-everyday"
  routing_mode: "history"
  startup_timeout_s: 30
  env: {}
  pre_start: ["npm install"]

auth:
  needs_auth: false
  state_file: ".superharness/e2e-auth.json"

browser:
  headless: false
  viewport: { width: 1920, height: 1080 }
  device: null
  color_scheme: null
  ignore_https_errors: false

mock:
  service: null
  static_routes: []

profiles:
  pc:
    browser: { viewport: { width: 1920, height: 1080 } }
  h5:
    app: { base_url: "http://localhost:4321/opensource-everyday" }
    browser: { device: "iPhone 14", viewport: { width: 390, height: 844 } }
